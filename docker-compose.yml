services:
  server:
    image: rust:1.94
    container_name: openrok-server
    working_dir: /workspace
    env_file:
      - .env.server
    environment:
      OPENROK_BIND: 0.0.0.0:8080
    command: cargo run -p server
    expose:
      - "8080"
    volumes:
      - .:/workspace
    restart: unless-stopped

  traefik:
    image: traefik:v3.0
    container_name: openrok-traefik
    depends_on:
      - server
    env_file:
      - .env.server
    entrypoint:
      - /bin/sh
    command:
      - -c
      - |
        sed "s/__OPENROK_DOMAIN__/$${OPENROK_DOMAIN}/g" /etc/traefik/traefik.dynamic.template.yml > /etc/traefik/dynamic.yml
        exec traefik \
          --providers.file.filename=/etc/traefik/dynamic.yml \
          --entrypoints.web.address=:80 \
          --entrypoints.websecure.address=:443 \
          --log.level=INFO \
          --accesslog=true
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./certs:/certs:ro
      - ./traefik.dynamic.template.yml:/etc/traefik/traefik.dynamic.template.yml:ro
    restart: unless-stopped
